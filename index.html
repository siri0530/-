<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원소 인베이더 (Element Invaders)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="modal">
            <div class="modal-content">
                <h2>⚠️ 미션 공지 ⚠️</h2>
                <p class="mission-text">우주 정거장으로 쏟아지는 원소 운석을 방어하라!<br><strong>[원소 이름]을 보고 올바른 [원소 기호]를 대소문자에 맞춰 입력하시오!</strong></p>
                <div id="name-input-area">
                    <input type="text" id="player-name" placeholder="닉네임 또는 학번 이름을 입력하세요" maxlength="10">
                    
                    <div style="margin: 15px 0; display: flex; justify-content: center; gap: 15px; align-items: center;">
                        <span style="font-size: 15px; color: #b0b3cc; font-weight: bold;">난이도 선택:</span>
                        <button id="level-low-btn" type="button" style="background: #00f2fe; color: #060713; border: none; padding: 8px 18px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; border: 2px solid #00f2fe;">하 (기본)</button>
                        <button id="level-high-btn" type="button" style="background: transparent; color: #ff4b72; border: 2px solid #ff4b72; padding: 8px 18px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer;">상 (지옥)</button>
                    </div>

                    <button id="start-btn" type="button" style="background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); color: #060713; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); margin-top: 10px;">게임 시작</button>
                </div>
            </div>
        </div>

        <div id="top-bar">
            <div id="score-board">점수: <span id="score">0</span></div>
            <div id="hearts-container">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
        </div>

        <div id="game-area"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="원소 기호를 입력하고 Enter!" disabled>
        </div>

        <div id="game-over-screen" class="modal hidden">
            <div class="modal-content">
                <h2 class="alert-title">GAME OVER</h2>
                <p>우주 정거장이 파괴되었습니다!</p>
                <div id="final-score">최종 점수: 0점</div>
                
                <div id="ranking-box">
                    <h3>🏆 명예의 전당 (우리 학교 랭킹)</h3>
                    <ol id="ranking-list">
                        </ol>
                </div>

                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button id="restart-btn" onclick="location.reload()">다시 도전하기</button>
                    <button id="reset-ranking-btn" style="background: #333; color: #aaa; border: 1px solid #555; padding: 12px 20px; font-size: 14px; font-weight: bold; border-radius: 25px; cursor: pointer;">기록 초기화</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
